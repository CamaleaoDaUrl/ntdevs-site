<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTDevs | New Tech Devs</title>
  <meta name="description" content="NTDevs é a frente de desenvolvimento da Advance Informática. Tecnologia que simplifica, com ADV Agenda, serviços técnicos e atendimento remoto." />
  <link rel="icon" type="image/png" href="./assets/logo-ntdevs.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap');
    :root{
      --bg:#041128;
      --bg-2:#091d44;
      --line:rgba(255,255,255,.08);
      --text:#f7f9ff;
      --muted:#b7c3d9;
      --white:#ffffff;
      --white-soft:#f6f8fc;
      --dark:#0d1729;
      --gray:#596983;
      --green:#13d3a1;
      --green-2:#08b587;
      --shadow:0 18px 48px rgba(3,17,40,.18);
      --shadow-strong:0 30px 80px rgba(3,17,40,.25);
      --radius:28px;
      --max:1200px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--white);
      color:var(--dark);
      overflow-x:hidden;
    }
    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}
    .container{max-width:var(--max);margin:0 auto;padding:0 24px}
    .section{padding:96px 0}
    .eyebrow{
      display:inline-flex;align-items:center;
      font-size:.76rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
      color:#10c798;margin-bottom:16px;
    }
    .title{
      font-family:Sora, Inter, sans-serif;
      font-size:clamp(2rem,4vw,3.5rem);
      line-height:1.02;
      letter-spacing:-.05em;
      margin:0;
    }
    .title .accent{color:var(--green)}
    .text{
      color:#5a6984;
      font-size:1.02rem;
      line-height:1.85;
      margin-top:18px;
      max-width:760px;
    }

    .hero-shell{
      min-height:100vh;
      position:relative;
      overflow:hidden;
      background:linear-gradient(90deg, var(--bg) 0 56%, #ffffff 56% 100%);
    }
    .grid-overlay{
      position:absolute;inset:0 44% 0 0;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size:48px 48px;
      pointer-events:none;
      mask-image:linear-gradient(180deg, rgba(0,0,0,.95), rgba(0,0,0,.4));
    }
    .nav{
      position:sticky;top:0;z-index:50;
      backdrop-filter:blur(16px);
      background:linear-gradient(90deg, rgba(4,17,40,.88) 0 56%, rgba(255,255,255,.94) 56% 100%);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .nav-inner{
      display:flex;align-items:center;justify-content:space-between;gap:20px;
      padding:18px 0;
    }
    .brand{
      display:flex;align-items:center;gap:14px;color:white;
    }
    .brand-icon{
      width:40px;height:40px;border-radius:14px;overflow:hidden;flex:0 0 auto;
      background:rgba(255,255,255,.05);box-shadow:0 10px 24px rgba(0,0,0,.22);
    }
    .brand-copy{line-height:1.04}
    .brand-copy strong{
      display:block;font-family:Sora,Inter,sans-serif;font-size:1.03rem;font-weight:800;
    }
    .brand-copy span{
      display:block;margin-top:4px;font-size:.73rem;color:#a7bdd9;
      letter-spacing:.18em;text-transform:uppercase;
    }
    .brand-copy small{
      display:block;margin-top:5px;font-size:.72rem;color:#7e92af;
    }
    .nav-right{
      display:flex;align-items:center;gap:28px;
      color:#687891;font-size:.95rem;
    }
    .nav-right a:hover{color:#0d1729}
    .nav-cta{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:48px;padding:0 22px;border-radius:999px;
      background:linear-gradient(135deg,var(--green),var(--green-2));
      color:#04211a;font-weight:800;
      box-shadow:0 14px 32px rgba(19,211,161,.28);
    }

    .hero{
      position:relative;
      padding:42px 0 64px;
    }
    .hero-grid{
      min-height:calc(100vh - 94px);
      display:grid;
      grid-template-columns:1.06fr .94fr;
      gap:24px;
      align-items:center;
    }
    .hero-left{
      color:var(--text);
      padding:14px 8px 24px 0;
    }
    .hero-chip{
      display:inline-flex;align-items:center;
      border:1px solid rgba(19,211,161,.22);
      background:rgba(19,211,161,.08);
      color:#baf4e7;
      border-radius:999px;
      padding:9px 14px;
      font-size:.8rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;
      margin-bottom:22px;
    }
    .hero-title{
      margin:0;
      font-family:Sora,Inter,sans-serif;
      font-size:clamp(3rem,7vw,6.2rem);
      line-height:.92;
      letter-spacing:-.07em;
      max-width:540px;
    }
    .hero-title .accent{color:var(--green)}
    .hero-text{
      max-width:560px;
      margin-top:26px;
      color:#c4d0e4;
      font-size:1.05rem;
      line-height:1.78;
    }
    .hero-actions{
      display:flex;flex-wrap:wrap;gap:14px;margin-top:30px;
    }
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:50px;padding:0 24px;border-radius:999px;
      font-size:.98rem;font-weight:800;
      border:1px solid transparent;
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn-primary{
      background:linear-gradient(135deg,var(--green),var(--green-2));
      color:#04211a;
      box-shadow:0 14px 32px rgba(19,211,161,.28);
    }
    .btn-outline{
      background:rgba(255,255,255,.02);
      border-color:rgba(255,255,255,.16);
      color:white;
    }
    .hero-highlights{
      display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
      margin-top:34px;max-width:760px;
    }
    .mini-card{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:18px;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow-strong);
    }
    .mini-card strong{display:block;color:white;margin-bottom:8px;font-size:1rem}
    .mini-card span{display:block;color:#b5c2da;font-size:.9rem;line-height:1.58}

    .hero-right{
      display:flex;align-items:center;justify-content:center;
      min-height:700px;position:relative;
    }
    .visual-panel{
      width:min(100%,560px);
      aspect-ratio:.88;
      border-radius:42px;
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,255,.98));
      border:1px solid rgba(9,18,36,.06);
      box-shadow:0 30px 80px rgba(11,18,32,.14);
      position:relative;
      overflow:hidden;
    }
    .visual-tag{
      position:absolute;left:22px;top:22px;z-index:3;
      max-width:250px;
      background:rgba(6,16,36,.88);
      color:white;
      padding:12px 14px;
      border-radius:18px;
      box-shadow:var(--shadow);
    }
    .visual-tag strong{display:block;font-size:1rem;margin-bottom:6px}
    .visual-tag span{display:block;color:#c4d0e6;font-size:.9rem;line-height:1.55}
    .orbital{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
    }
    .shape{
      position:absolute;border-radius:42%;
      background:
        radial-gradient(circle at 32% 28%, rgba(19,211,161,.62), rgba(19,211,161,.12) 40%, rgba(0,0,0,0) 58%),
        linear-gradient(180deg, rgba(255,255,255,.85), rgba(225,255,247,.28));
      border:1px solid rgba(0,0,0,.04);
      box-shadow:inset 0 2px 18px rgba(255,255,255,.75), 0 22px 55px rgba(7,22,58,.12);
      backdrop-filter:blur(10px);
    }
    .shape.a{width:310px;height:360px;transform:rotate(24deg)}
    .shape.b{width:250px;height:320px;transform:rotate(-28deg)}
    .shape.c{width:180px;height:230px;transform:rotate(76deg)}
    .floating-shot{
      position:absolute;right:18px;bottom:18px;z-index:3;
      width:220px;border-radius:32px;background:#0b1220;padding:10px;
      box-shadow:0 24px 56px rgba(3,17,40,.18);
    }
    .floating-shot img{border-radius:22px;width:100%}

    .section-light{background:#f8fbff}
    .section-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:42px;align-items:start;
    }
    .soft-card{
      background:white;border:1px solid rgba(9,18,36,.07);
      border-radius:28px;padding:26px;box-shadow:var(--shadow);
    }
    .soft-card h3{
      margin:0 0 12px;font-family:Sora,Inter,sans-serif;font-size:1.18rem;color:#0d1729;
    }
    .soft-card p{margin:0;color:#5d6d88;line-height:1.78}
    .about-stack{display:grid;gap:18px;margin-top:26px}
    .media-frame{
      background:white;border:1px solid rgba(9,18,36,.07);border-radius:34px;
      padding:14px;box-shadow:var(--shadow-strong);overflow:hidden;
    }
    .media-frame img{width:100%;border-radius:24px}
    .feature-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:34px;
    }
    .service-card{
      background:white;border:1px solid rgba(9,18,36,.08);border-radius:26px;
      padding:24px;box-shadow:var(--shadow);height:100%;
    }
    .service-icon{
      width:52px;height:52px;border-radius:18px;
      display:grid;place-items:center;
      background:linear-gradient(135deg, rgba(19,211,161,.16), rgba(19,211,161,.06));
      color:#08aa82;font-weight:900;font-family:Sora,Inter,sans-serif;
      margin-bottom:16px;
    }
    .service-card h3{
      margin:0 0 10px;font-family:Sora,Inter,sans-serif;font-size:1.18rem;color:#0f1a30;
    }
    .service-card p{margin:0;color:#586984;line-height:1.72}
    .notice{
      margin-top:22px;padding:18px;border-radius:22px;
      background:rgba(19,211,161,.08);border:1px solid rgba(19,211,161,.18);
      color:#40665d;line-height:1.72;
    }

    .app-shell{
      position:relative;overflow:hidden;
      background:linear-gradient(180deg, rgba(4,17,40,.99), rgba(4,15,34,.99));
      color:var(--text);
    }
    .app-shell:before{
      content:"";position:absolute;inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:42px 42px;opacity:.34;pointer-events:none;
    }
    .app-grid{
      position:relative;
      display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:center;
    }
    .app-grid .title{color:white}
    .app-grid .text{color:#bcc8de}
    .bullet-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px;
    }
    .bullet{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;padding:14px 16px;
      color:#d1dbef;line-height:1.62;
    }
    .bullet strong{display:block;color:white;margin-bottom:6px;font-size:.98rem}
    .shot-grid{
      display:grid;grid-template-columns:repeat(2,1fr);gap:16px;
    }
    .shot{
      background:rgba(255,255,255,.055);
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;padding:10px;
      box-shadow:var(--shadow-strong);
    }
    .shot img{width:100%;border-radius:22px}
    .plans-wrap{position:relative;margin-top:56px}
    .plans-head{text-align:center;max-width:880px;margin:0 auto 30px}
    .plans-head .title{color:white}
    .plans-head .text{color:#bac7de;margin-left:auto;margin-right:auto}
    .plans{
      display:grid;grid-template-columns:repeat(3,1fr);gap:20px;
    }
    .plan{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;padding:28px;box-shadow:var(--shadow-strong);
    }
    .plan.featured{
      background:linear-gradient(180deg, rgba(19,211,161,.14), rgba(255,255,255,.05));
      border-color:rgba(19,211,161,.26);
    }
    .plan-tag{
      display:inline-flex;padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.06);color:#d5deef;font-size:.82rem;font-weight:800;
      margin-bottom:16px;
    }
    .plan h3{margin:0 0 8px;font-family:Sora,Inter,sans-serif;font-size:1.3rem;color:white}
    .plan-price{margin:0 0 12px;font-family:Sora,Inter,sans-serif;font-size:1.95rem;font-weight:900;color:white}
    .plan p{margin:0 0 16px;color:#bac6dc;line-height:1.72}
    .plan ul{list-style:none;padding:0;margin:0;display:grid;gap:10px}
    .plan li{display:flex;gap:10px;color:#d8e0f0;line-height:1.6}
    .plan li:before{content:"✓";color:var(--green);font-weight:900}
    .full-note{
      margin-top:22px;padding:18px;border-radius:20px;text-align:center;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#c6d1e5;
    }

    .contact-shell{
      background:#061327;color:var(--text);
    }
    .contact-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:34px;padding:42px 30px;text-align:center;
      box-shadow:var(--shadow-strong);
    }
    .contact-card .title{color:white}
    .contact-card .text{color:#c0cce2;max-width:780px;margin-left:auto;margin-right:auto}
    .number{
      margin-top:22px;font-family:Sora,Inter,sans-serif;font-size:clamp(2rem,4vw,3.3rem);
      letter-spacing:-.05em;color:white;
    }
    .footer{
      border-top:1px solid rgba(255,255,255,.08);
      margin-top:34px;padding:24px 0 34px;color:#b9c6dd;font-size:.92rem;
    }
    .footer-row{
      display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
    }

    @media (max-width: 1120px){
      .hero-shell{background:linear-gradient(180deg, var(--bg) 0 58%, #ffffff 58% 100%)}
      .nav{background:linear-gradient(180deg, rgba(4,17,40,.88) 0 58%, rgba(255,255,255,.94) 58% 100%)}
      .hero-grid,.section-grid,.app-grid{grid-template-columns:1fr}
      .hero-right{min-height:520px}
      .visual-panel{width:min(100%,780px);aspect-ratio:1.15}
      .grid-overlay{inset:0}
    }
    @media (max-width: 900px){
      .nav-right{display:none}
      .hero-highlights,.feature-grid,.plans,.bullet-grid,.shot-grid{grid-template-columns:1fr}
    }
    @media (max-width: 640px){
      .section{padding:74px 0}
      .hero{padding:28px 0 54px}
      .hero-actions{flex-direction:column}
      .btn{width:100%}
      .visual-panel{border-radius:28px}
      .floating-shot{position:static;width:72%;margin:0 auto 18px}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { motion } from 'https://esm.sh/framer-motion@11.0.8?external=react,react-dom';
    import htm from 'https://esm.sh/htm@3.1.1';

    const html = htm.bind(React.createElement);

    const navLinks = [

      {

      {
        icon: '03',

        text: 'Compartilhamento de impressoras em rede, ajustes técnicos e diagnósticos para repasse a técnicos locais quando necessário.'

    const bullets = [
      {

      {
        title: 'Financeiro no mesmo app',

      {

    const plans = [
      {
        tag: 'Free',
        title: 'Primeiros passos',
        price: 'Grátis',
        featured: false,
        text: 'Ideal para conhecer o aplicativo e começar a organizar o básico da rotina.',
        items: [
          'Acesso à proposta principal do app',
          'Uso inicial da agenda e da organização diária',
          'Versão de entrada para experimentar a plataforma'
        ]
      },
      {
        tag: 'Versão completa',
        title: 'Pro',
        price: 'Mais benefícios',
        featured: true,
        text: 'A camada principal do produto, com maior liberdade de uso e acesso aos diferenciais que ampliam o valor do app.',
        items: [
          'Mais profundidade em rotina e financeiro',
          'Recursos avançados de produtividade',
          'Maior aproveitamento da proposta completa'
        ]
      },
      {
        tag: 'IA financeira',
        title: 'Equilíbrio',
        price: 'Nível premium',
        featured: false,
        text: 'Módulo mais estratégico do ADV Agenda, voltado a diagnóstico, análise e apoio à decisão.',
        items: [
          'Leitura financeira mais avançada',
          'Diagnósticos e visão ampliada do mês',
          'Recursos voltados à clareza e planejamento'
        ]
      }
    ];

    const commonViewport = { once: true, amount: 0.22 };

    function App() {
      return html`
        <div>
          <div className="hero-shell" id="inicio">
            <div className="grid-overlay"></div>

            <div className="nav">
              <div className="container nav-inner">
                <a className="brand" href="#inicio">
                  <div className="brand-icon">
                    <img src="./assets/logo-ntdevs.png" alt="Logo NTDevs" />
                  </div>
                  <div className="brand-copy">
                    <strong>NTDevs</strong>
                    <span>NTDevs • New Tech Devs</span>
                    <small>by Advance Informática</small>
                  </div>
                </a>

                <div className="nav-right">
                  ${navLinks.map(link => html`<a href=${link.href}>${link.label}</a>`)}
                  <a className="nav-cta" href="https://wa.me/5569984787878" target="_blank" rel="noreferrer">Fale Conosco</a>
                </div>
              </div>
            </div>

            <section className="hero">
              <div className="container hero-grid">
                <${motion.div}
                  className="hero-left"
                  initial=${{ opacity: 0, y: 28 }}
                  animate=${{ opacity: 1, y: 0 }}
                  transition=${{ duration: 0.9, ease: [0.22, 1, 0.36, 1] }}
                >
                  <div className="hero-chip">NTDevs • tecnologia que simplifica</div>
                  <h1 className="hero-title">
                    TECNOLOGIA<br />
                    QUE<br />
                    <span className="accent">SIMPLIFICA.</span>
                  </h1>
                  <p className="hero-text">
                    A NTDevs é a frente digital da Advance Informática. Desenvolvemos soluções digitais,
                    produtos próprios e uma presença tecnológica mais moderna para facilitar a vida de
                    pessoas e empresas com mais clareza, inovação e confiança.
                  </p>

                  <div className="hero-actions">
                    <a className="btn btn-primary" href="#advagenda">Conhecer ADV Agenda</a>
                    <a className="btn btn-outline" href="https://wa.me/5569984787878" target="_blank" rel="noreferrer">Fale Conosco</a>

                    ].map(item => html`
                      <${motion.div}
                        className="mini-card"
                        initial=${{ opacity: 0, y: 18 }}

                        <span>${item[1]}</span>
                      </${motion.div}>
                    `)}
                  </div>
                </${motion.div}>

                <${motion.div}
                  className="hero-right"
                  initial=${{ opacity: 0, x: 30 }}
                  animate=${{ opacity: 1, x: 0 }}
                  transition=${{ duration: 0.95, delay: 0.12, ease: [0.22, 1, 0.36, 1] }}
